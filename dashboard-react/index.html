    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ec4899" />
    <script>
      window.addEventListener('error', function(e) {
        // Detect Vite chunk load failure before React mounts
        if (e.message && (/Failed to fetch dynamically imported module/i.test(e.message) || /error loading dynamically imported module/i.test(e.message) || /Importing a module script failed/i.test(e.message) || /carga del m.dulo/i.test(e.message))) {
          if (!sessionStorage.getItem('vite_reload')) {
            sessionStorage.setItem('vite_reload', 'true');
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                for(let reg of regs) reg.unregister();
                window.location.reload(true);
              });
            } else {
              window.location.reload(true);
            }
          }
        }
      }, true);
    </script>
    <meta name="description" content="AuraDash — el sistema operativo adaptable a tu negocio." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
