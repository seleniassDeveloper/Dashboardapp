<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AuraDash — Demo Interactiva</title>
<style>
:root{--violet:#7C3AED;--violet2:#5B21B6;--blue:#3B82F6;--green:#10B981;--bg:#0a0f1d;--panel:#111a2e;--panel2:#0f1729;--line:#22304d;--muted:#8aa0c2;--txt:#e9eef7;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(120% 90% at 80% -10%, #1a2444 0%, var(--bg) 55%);color:var(--txt);min-height:100vh;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
.wrap{max-width:1240px;margin:0 auto;padding:22px 20px 50px;}
.top{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.top img{height:40px} .top .t{font-weight:800;font-size:16px} .top .t small{display:block;color:var(--muted);font-weight:600;font-size:12px}
.top .count{margin-left:auto;color:var(--muted);font-size:13px;font-weight:600;background:#141d33;border:1px solid var(--line);padding:6px 14px;border-radius:999px;}
.grid{display:grid;grid-template-columns:290px 1fr;gap:22px;}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.side{display:flex;flex-direction:column;gap:8px;}
.stepbtn{display:flex;gap:12px;align-items:center;text-align:left;background:var(--panel);border:1px solid var(--line);color:var(--txt);
 border-radius:12px;padding:12px 14px;cursor:pointer;transition:.15s;}
.stepbtn:hover{border-color:#3a4d78}
.stepbtn.on{background:linear-gradient(135deg,var(--violet2),var(--violet));border-color:transparent;box-shadow:0 10px 24px rgba(124,58,237,.3);}
.stepbtn .ic{width:34px;height:34px;border-radius:9px;background:#1c2betc;display:flex;align-items:center;justify-content:center;font-size:17px;background:#1b2540;flex:none;}
.stepbtn.on .ic{background:rgba(255,255,255,.18)}
.stepbtn .lbl{font-size:14px;font-weight:700;line-height:1.2}
.stepbtn .num{color:var(--muted);font-size:11px;font-weight:700}
.stepbtn.on .num{color:#e5d9ff}
.main{background:var(--panel2);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.4);}
.browser{background:#0b1324;padding:12px 14px 0;}
.bbar{display:flex;align-items:center;gap:8px;padding-bottom:10px;}
.bdot{width:11px;height:11px;border-radius:50%}
.d1{background:#ff5f57}.d2{background:#febc2e}.d3{background:#28c840}
.url{margin-left:10px;flex:1;background:#131d33;border:1px solid var(--line);border-radius:8px;color:#9fb2d4;font-size:12px;padding:5px 12px;}
.shot{display:block;width:100%;background:#0b1324;}
.info{padding:20px 26px 24px;}
.chip{display:inline-block;background:rgba(124,58,237,.18);color:#c9b6ff;font-weight:800;font-size:12px;border-radius:999px;padding:4px 12px;margin-bottom:8px;}
.info h2{font-size:23px;margin:2px 0 8px}
.info p{color:#c3d0e6;font-size:15.5px;max-width:820px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tag{background:#141d33;border:1px solid var(--line);color:#a9bde0;font-size:12.5px;font-weight:600;border-radius:8px;padding:5px 11px}
.foot{display:flex;align-items:center;gap:14px;margin-top:16px}
.prog{flex:1;height:6px;background:#141d33;border-radius:999px;overflow:hidden}
.prog div{height:100%;width:0;background:linear-gradient(90deg,var(--violet),var(--blue));transition:width .3s}
button.nav{border:none;border-radius:999px;padding:11px 20px;font-size:14px;font-weight:800;cursor:pointer}
.prev{background:#1b2540;color:#cdd9ef} .prev:disabled{opacity:.4;cursor:not-allowed}
.next{background:linear-gradient(135deg,var(--violet2),var(--violet));color:#fff;box-shadow:0 8px 20px rgba(124,58,237,.4)}
.cta{display:none;text-align:center;padding:50px 26px;background:linear-gradient(135deg,var(--violet2),var(--violet) 60%,var(--blue));border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.cta img{height:56px;margin-bottom:14px}
.cta h3{font-size:28px;margin-bottom:8px} .cta p{opacity:.94;margin-bottom:18px;font-size:16px}
.cta a{display:inline-block;font-weight:800;text-decoration:none;padding:12px 26px;border-radius:999px;margin:5px}
.cta .a1{background:#fff;color:var(--violet2)} .cta .a2{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.4)}
</style></head><body><div class="wrap">
