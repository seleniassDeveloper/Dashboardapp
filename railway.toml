# Railway — SOLO backend (API). El frontend va en Vercel.
# En Railway → Settings → Build: elegir "Dockerfile" si Nixpacks sigue fallando.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "Dockerfile", "railway.toml", "package.json"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
